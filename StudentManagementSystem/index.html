<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1>🎓 Student Management System</h1>
    <p class="subtitle">Manage Student Records Efficiently</p>

    <!-- Student Form -->
    <div class="card">

        <h2>Add / Update Student</h2>

        <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="name" placeholder="Enter Student Name">
        </div>

        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" id="roll" placeholder="Enter Roll Number">
        </div>

        <div class="form-group">
            <label>Course</label>
            <input type="text" id="course" placeholder="Enter Course">
        </div>

        <div class="form-group">
            <label>Grade</label>
            <input type="text" id="grade" placeholder="Enter Grade">
        </div>

        <div class="btn-group">

            <button class="add-btn" onclick="addStudent()">
                Add Student
            </button>

            <button class="update-btn" onclick="updateStudent()">
                Update Student
            </button>

            <button class="clear-btn" onclick="clearFields()">
                Clear
            </button>

        </div>

    </div>

    <!-- Search -->

    <div class="card">

        <h2>Search Student</h2>

        <input
            type="text"
            id="search"
            placeholder="Search by Name or Roll Number"
            onkeyup="searchStudent()">

    </div>

    <!-- Student List -->

    <div class="card">

        <h2>Student Records</h2>

        <table>

            <thead>

            <tr>

                <th>Name</th>
                <th>Roll No</th>
                <th>Course</th>
                <th>Grade</th>
                <th>Actions</th>

            </tr>

            </thead>

            <tbody id="studentTable">

            </tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
