<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎓 Student Grade Calculator</h1>

    <input type="number" id="sub1" placeholder="Subject 1 Marks">
    <input type="number" id="sub2" placeholder="Subject 2 Marks">
    <input type="number" id="sub3" placeholder="Subject 3 Marks">
    <input type="number" id="sub4" placeholder="Subject 4 Marks">
    <input type="number" id="sub5" placeholder="Subject 5 Marks">
    <input type="number" id="sub6" placeholder="Subject 6 Marks">
<input type="number" id="sub7" placeholder="Subject 7 Marks">
<input type="number" id="sub8" placeholder="Subject 8 Marks">
<input type="number" id="sub9" placeholder="Subject 9 Marks">
<input type="number" id="sub10" placeholder="Subject 10 Marks">
<input type="number" id="sub11" placeholder="Subject 11 Marks">
    <input type="number" id="sub12" placeholder="Subject 12 Marks">


    <button onclick="calculateResult()">Calculate Result</button>

    <div class="result">
        <p id="total"></p>
        <p id="average"></p>
        <p id="grade"></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
